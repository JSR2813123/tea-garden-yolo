worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    # ===== gzip START ===== 回傳給瀏覽器的文字壓縮
    gzip on;  #開關
    gzip_http_version 1.1;
    gzip_comp_level 5;   #壓縮強度
    gzip_min_length 1;  #小於1KB不要壓縮，不然反而壓縮檔比原本更大
    gzip_vary on;         #告訴中間的快取這個東西有壓縮的版本可以拿
    gzip_proxied any;     #反向代理的回應也可以壓縮
    gzip_types            #以下是能壓縮的類型(白名單)
      text/plain 
      text/css
      application/json
      application/javascript
      text/xml
      application/xml
      application/xml+rss
      image/svg+xml;
    # ===== gzip END =====
    # ===== 限流 start =====
    log_format main '$remote_addr - [$time_local] "$request" $status '
                    'rt=$request_time urt=$upstream_response_time '
                    '"$http_referer" "$http_user_agent"';

    access_log logs/access.log main;
    error_log  logs/error.log warn;
    # ===== 限流 end =====




    # ===== rate limit zone START =====
    map $request_method $login_limit_key {
        default "";
        POST $binary_remote_addr;
    }
    # 只用在 /admin/login/的post，get不限制次數，不然會導致刷新5次就被封
    limit_req_zone $login_limit_key zone=login_post_limit:10m rate=1r/s;

    # ===== rate limit zone END =====


    sendfile        on;
    keepalive_timeout  65;

    # HTTP 8080 -> HTTPS 8443
    server {
        listen 8080;
        server_name localhost;

        return 301 https://$host:8443$request_uri;
}

    # HTTPS 8443 (真正服務)
    server {
        
        listen 8443 ssl;
        server_name localhost;

        client_max_body_size 50m;

        #ssl_certificate     /etc/letsencrypt/live/yourdomain/fullchain.pem;  正式部署要用的
        #ssl_certificate_key /etc/letsencrypt/live/yourdomain/privkey.pem;    正式部署要用的
        #公鑰和憑證轉為fullchain.pem，私鑰改為privkey.pem，mkcert_CA改為公開CA

        ssl_certificate     certs/localhost+2.pem;     
        ssl_certificate_key certs/localhost+2-key.pem; 

        # ssl_certificate     certs/172.20.10.3+3.pem;
        # ssl_certificate_key certs/172.20.10.3+3-key.pem;


        charset utf-8;
        
        limit_req_status 429;

        # ===== security headers START =====
        add_header X-Content-Type-Options "nosniff" always;    
        #content-type-options用nosiff，防止MIME sniffing攻擊andXSS攻擊，比如假裝傳.jpg,.css但其實是一個js腳本，就會被當作可以執行的惡意腳本
        add_header X-Frame-Options "SAMEORIGIN" always; #SameOrigin代表可以iframe自己,但其他人不行
        #frame-options防止Clickjacking（點擊劫持），比如用一個透明按鈕騙使用者點擊
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # ===== security headers END =====



        location = /api/infer/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_connect_timeout 10s;
            proxy_send_timeout 1800s;  #避免sahi推論超時
            proxy_read_timeout 1800s;
            send_timeout 1800s;
        }


        
        location / {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            #proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_connect_timeout 10s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            send_timeout 600s;
        }

        location /static/ {
            alias C:/Users/C_PLUS_PLUS/tea-ai/staticfiles/;
        }

        location /media/ {
            alias C:/Users/C_PLUS_PLUS/tea-ai/media/;
        }

        location = /__gzip_test {
            default_type text/plain;
            return 200 "hello hello hello hello hello hello hello hello hello hello hello hello hello hello hello\n";
        }

        location ^~ /introduction/ {
            auth_basic "Admin Area";
            auth_basic_user_file C:/Users/C_PLUS_PLUS/nginx/conf/auth/admin.htpasswd;
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            #proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }
        location = /introduction/infer/ {
            auth_basic "Admin Area";
            auth_basic_user_file C:/Users/C_PLUS_PLUS/nginx/conf/auth/admin.htpasswd;
            limit_req zone=login_post_limit burst=5 nodelay;
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            #proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
        }


    }
}
